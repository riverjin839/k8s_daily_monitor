name: CD - Kubernetes Deployment

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'k8s/**'
      - '.github/workflows/cd.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_BACKEND: ${{ github.repository }}/backend
  IMAGE_NAME_FRONTEND: ${{ github.repository }}/frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      backend-image: ${{ steps.meta-backend.outputs.tags }}
      frontend-image: ${{ steps.meta-frontend.outputs.tags }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Extract metadata for Frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-dev:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event.inputs.environment == 'dev' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    environment: dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check kubeconfig secret availability
        id: check-secret
        env:
          KUBECONFIG_SECRET: ${{ secrets.KUBECONFIG_DEV }}
        run: |
          if [ -z "$KUBECONFIG_SECRET" ]; then
            echo "⚠️  KUBECONFIG_DEV secret is not configured."
            echo "   To enable Kubernetes deployment, add the KUBECONFIG_DEV secret to the"
            echo "   'dev' environment in: Settings → Environments → dev → Secrets."
            echo "   The value must be the base64-encoded kubeconfig YAML:"
            echo "     cat ~/.kube/config | base64 -w0"
            echo "has_kubeconfig=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_kubeconfig=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup kubectl
        if: steps.check-secret.outputs.has_kubeconfig == 'true'
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Setup Kustomize
        if: steps.check-secret.outputs.has_kubeconfig == 'true'
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: '5.3.0'

      - name: Configure kubectl
        if: steps.check-secret.outputs.has_kubeconfig == 'true'
        env:
          KUBECONFIG_SECRET: ${{ secrets.KUBECONFIG_DEV }}
        run: |
          mkdir -p ~/.kube
          echo "$KUBECONFIG_SECRET" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl cluster-info

      - name: Update image tags in kustomization
        if: steps.check-secret.outputs.has_kubeconfig == 'true'
        working-directory: k8s/overlays/dev
        run: |
          kustomize edit set image \
            k8s-daily-monitor/backend=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:${{ github.sha }} \
            k8s-daily-monitor/frontend=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:${{ github.sha }}

      - name: Deploy to Dev Kubernetes
        if: steps.check-secret.outputs.has_kubeconfig == 'true'
        run: |
          kustomize build k8s/overlays/dev | kubectl apply -f -

      - name: Wait for deployment rollout
        if: steps.check-secret.outputs.has_kubeconfig == 'true'
        run: |
          kubectl rollout status deployment/dev-backend -n k8s-monitor-dev --timeout=300s
          kubectl rollout status deployment/dev-frontend -n k8s-monitor-dev --timeout=300s
          kubectl rollout status deployment/dev-celery-worker -n k8s-monitor-dev --timeout=300s

      - name: Verify deployment
        if: steps.check-secret.outputs.has_kubeconfig == 'true'
        run: |
          echo "=== Deployment Status ==="
          kubectl get deployments -n k8s-monitor-dev
          echo ""
          echo "=== Pod Status ==="
          kubectl get pods -n k8s-monitor-dev
          echo ""
          echo "=== Services ==="
          kubectl get services -n k8s-monitor-dev

  deploy-prod:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event.inputs.environment == 'prod'
    environment: prod

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check kubeconfig secret availability
        id: check-secret
        env:
          KUBECONFIG_SECRET: ${{ secrets.KUBECONFIG_PROD }}
        run: |
          if [ -z "$KUBECONFIG_SECRET" ]; then
            echo "⚠️  KUBECONFIG_PROD secret is not configured."
            echo "   To enable Kubernetes deployment, add the KUBECONFIG_PROD secret to the"
            echo "   'prod' environment in: Settings → Environments → prod → Secrets."
            echo "   The value must be the base64-encoded kubeconfig YAML:"
            echo "     cat ~/.kube/config | base64 -w0"
            echo "has_kubeconfig=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_kubeconfig=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup kubectl
        if: steps.check-secret.outputs.has_kubeconfig == 'true'
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Setup Kustomize
        if: steps.check-secret.outputs.has_kubeconfig == 'true'
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: '5.3.0'

      - name: Configure kubectl
        if: steps.check-secret.outputs.has_kubeconfig == 'true'
        env:
          KUBECONFIG_SECRET: ${{ secrets.KUBECONFIG_PROD }}
        run: |
          mkdir -p ~/.kube
          echo "$KUBECONFIG_SECRET" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl cluster-info

      - name: Update image tags in kustomization
        if: steps.check-secret.outputs.has_kubeconfig == 'true'
        working-directory: k8s/overlays/prod
        run: |
          kustomize edit set image \
            k8s-daily-monitor/backend=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:${{ github.sha }} \
            k8s-daily-monitor/frontend=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:${{ github.sha }}

      - name: Deploy to Prod Kubernetes
        if: steps.check-secret.outputs.has_kubeconfig == 'true'
        run: |
          kustomize build k8s/overlays/prod | kubectl apply -f -

      - name: Wait for deployment rollout
        if: steps.check-secret.outputs.has_kubeconfig == 'true'
        run: |
          kubectl rollout status deployment/prod-backend -n k8s-monitor-prod --timeout=300s
          kubectl rollout status deployment/prod-frontend -n k8s-monitor-prod --timeout=300s
          kubectl rollout status deployment/prod-celery-worker -n k8s-monitor-prod --timeout=300s

      - name: Verify deployment
        if: steps.check-secret.outputs.has_kubeconfig == 'true'
        run: |
          echo "=== Deployment Status ==="
          kubectl get deployments -n k8s-monitor-prod
          echo ""
          echo "=== Pod Status ==="
          kubectl get pods -n k8s-monitor-prod
          echo ""
          echo "=== Services ==="
          kubectl get services -n k8s-monitor-prod

      - name: Post deployment notification
        if: steps.check-secret.outputs.has_kubeconfig == 'true' && success()
        run: |
          echo "Production deployment completed successfully!"
          echo "Image tags: ${{ github.sha }}"

  cleanup-old-images:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: 오래된 컨테이너 이미지 자동 청소 (Backend / Frontend)
        uses: actions/github-script@v7
        with:
          script: |
            const KEEP = 5;
            const owner = context.repo.owner;
            const packages = [
              `${context.repo.repo}/backend`,
              `${context.repo.repo}/frontend`,
            ];

            // org 여부 확인 (org vs 개인 계정 API 엔드포인트 분기)
            let isOrg = false;
            try {
              await github.rest.orgs.get({ org: owner });
              isOrg = true;
            } catch (_) {}

            for (const pkg of packages) {
              let versions;
              try {
                versions = isOrg
                  ? await github.paginate(
                      github.rest.packages.getAllPackageVersionsForPackageOwnedByOrg,
                      { package_type: 'container', package_name: pkg, org: owner }
                    )
                  : await github.paginate(
                      github.rest.packages.getAllPackageVersionsForPackageOwnedByUser,
                      { package_type: 'container', package_name: pkg, username: owner }
                    );
              } catch (e) {
                core.warning(`${pkg} 버전 목록 조회 실패: ${e.message}`);
                continue;
              }

              // 태그 없는 버전만, 최신순 정렬 후 KEEP개 초과분 삭제
              const untagged = versions
                .filter(v => v.metadata?.container?.tags?.length === 0)
                .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

              const toDelete = untagged.slice(KEEP);
              core.info(`[${pkg}] 미태그 버전 ${untagged.length}개 중 ${toDelete.length}개 삭제`);

              for (const v of toDelete) {
                try {
                  if (isOrg) {
                    await github.rest.packages.deletePackageVersionForOrg({
                      package_type: 'container', package_name: pkg,
                      org: owner, package_version_id: v.id,
                    });
                  } else {
                    await github.rest.packages.deletePackageVersionForUser({
                      package_type: 'container', package_name: pkg,
                      username: owner, package_version_id: v.id,
                    });
                  }
                  core.info(`  삭제 완료: ${v.name} (id: ${v.id})`);
                } catch (e) {
                  core.warning(`  삭제 실패 ${v.id}: ${e.message}`);
                }
              }
            }
