apiVersion: v1
kind: ServiceAccount
metadata:
  name: superpod-agent
  namespace: k8s-monitor-agent
  labels:
    app.kubernetes.io/name: superpod-agent
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: superpod-agent-reader
  labels:
    app.kubernetes.io/name: superpod-agent
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - pods
      - services
      - endpoints
      - namespaces
      - componentstatuses
      - configmaps
      - persistentvolumes
      - persistentvolumeclaims
      - serviceaccounts
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - statefulsets
      - daemonsets
      - replicasets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources:
      - roles
      - rolebindings
      - clusterroles
      - clusterrolebindings
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources:
      - pods/log
    verbs: ["get"]
  # kubeadm certs check-expiration / etcdctl 실행 → pods/exec 필요
  - apiGroups: [""]
    resources:
      - pods/exec
      - pods/proxy
      - nodes/proxy
    verbs: ["create", "get"]
  # pod_to_pod 체커가 일회용 probe pod 를 띄우기 위한 권한
  - apiGroups: [""]
    resources:
      - pods
    verbs: ["create", "delete"]
  - nonResourceURLs:
      - /healthz
      - /livez
      - /readyz
      - /healthz/*
      - /livez/*
      - /readyz/*
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: superpod-agent-reader-binding
  labels:
    app.kubernetes.io/name: superpod-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: superpod-agent-reader
subjects:
  - kind: ServiceAccount
    name: superpod-agent
    namespace: k8s-monitor-agent
