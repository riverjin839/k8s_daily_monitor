apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: k8s-monitor
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: k8s-daily-monitor
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: k8s-daily-monitor
    spec:
      serviceAccountName: k8s-monitor-sa
      initContainers:
        - name: wait-for-db
          image: postgres:15-alpine
          command:
            - sh
            - -c
            - |
              until pg_isready -h postgres -p 5432 -U postgres; do
                echo "Waiting for postgres..."
                sleep 2
              done
              echo "PostgreSQL is ready!"
      containers:
        - name: backend
          image: k8s-daily-monitor/backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: DEBUG
              valueFrom:
                configMapKeyRef:
                  name: k8s-monitor-config
                  key: DEBUG
            - name: CHECK_INTERVAL_MINUTES
              valueFrom:
                configMapKeyRef:
                  name: k8s-monitor-config
                  key: CHECK_INTERVAL_MINUTES
            - name: CHECK_TIMEOUT_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: k8s-monitor-config
                  key: CHECK_TIMEOUT_SECONDS
            - name: ANSIBLE_PLAYBOOK_DIR
              valueFrom:
                configMapKeyRef:
                  name: k8s-monitor-config
                  key: ANSIBLE_PLAYBOOK_DIR
            - name: ANSIBLE_INVENTORY_DIR
              valueFrom:
                configMapKeyRef:
                  name: k8s-monitor-config
                  key: ANSIBLE_INVENTORY_DIR
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: k8s-monitor-secret
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: k8s-monitor-secret
                  key: REDIS_URL
            - name: CELERY_BROKER_URL
              valueFrom:
                secretKeyRef:
                  name: k8s-monitor-secret
                  key: CELERY_BROKER_URL
            - name: CELERY_RESULT_BACKEND
              valueFrom:
                secretKeyRef:
                  name: k8s-monitor-secret
                  key: CELERY_RESULT_BACKEND
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: k8s-monitor-secret
                  key: SECRET_KEY
            - name: PROMETHEUS_URL
              valueFrom:
                configMapKeyRef:
                  name: k8s-monitor-config
                  key: PROMETHEUS_URL
            - name: GRAFANA_URL
              valueFrom:
                configMapKeyRef:
                  name: k8s-monitor-config
                  key: GRAFANA_URL
            - name: OLLAMA_URL
              valueFrom:
                configMapKeyRef:
                  name: k8s-monitor-config
                  key: OLLAMA_URL
            - name: OLLAMA_MODEL
              valueFrom:
                configMapKeyRef:
                  name: k8s-monitor-config
                  key: OLLAMA_MODEL
          resources:
            # 대규모 클러스터 (수백 노드) 정보 수집 시 k8s API 응답 역직렬화로 메모리
            # 스파이크가 발생 — 512Mi 제한에서 OOMKilled → 500 에러 유발 이력 있음.
            # 안전 마진 확보 + auto-update 는 read_namespaced_pod 로 최소화 했음.
            requests:
              memory: "384Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: ansible-playbooks
              mountPath: /app/ansible/playbooks
              readOnly: true
            - name: kubeconfig
              mountPath: /root/.kube
              readOnly: true
      volumes:
        - name: ansible-playbooks
          configMap:
            name: ansible-playbooks
        - name: kubeconfig
          secret:
            secretName: kubeconfig-secret
            optional: true
