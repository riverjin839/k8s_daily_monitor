<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="DEVOPS MANAGEMENT">
  <defs>
    <!-- Anthropic-inspired warm coral gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#E89072"/>
      <stop offset="55%"  stop-color="#D9785C"/>
      <stop offset="100%" stop-color="#B85B40"/>
    </linearGradient>
    <!-- Top-left soft shine for depth -->
    <radialGradient id="shine" cx="22%" cy="18%" r="65%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="60%"  stop-color="#FFFFFF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <!-- Cream-on-coral sparkle gradient -->
    <linearGradient id="spark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FBEEDC"/>
      <stop offset="100%" stop-color="#F2D9B6"/>
    </linearGradient>
    <!-- Subtle drop-shadow under the sparkle -->
    <filter id="lift" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="0.8"/>
      <feOffset dx="0" dy="0.8" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded-square chrome (modern app-icon look) -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#bg)"/>
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#shine)"/>

  <!-- Anthropic-style 4-point sparkle / asterisk: sharp tips with concave valleys -->
  <path filter="url(#lift)"
        d="M32 6
           C 32 24, 26 32, 6 32
           C 26 32, 32 40, 32 58
           C 32 40, 38 32, 58 32
           C 38 32, 32 24, 32 6 Z"
        fill="url(#spark)"/>

  <!-- Tiny inner highlight near top-left of sparkle for jewel-like quality -->
  <path d="M32 12 C 32 22, 28 28, 18 31 C 28 30, 32 24, 32 12 Z"
        fill="#FFFFFF" fill-opacity="0.35"/>

  <!-- Inner stroke for crispness on light backgrounds -->
  <rect x="2.5" y="2.5" width="59" height="59" rx="13.5"
        fill="none" stroke="#000000" stroke-opacity="0.08"/>
</svg>
