{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name }}
  labels:
    {{- include "k8s-daily-monitor.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Namespace }}-cluster-reader
  labels:
    {{- include "k8s-daily-monitor.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: [nodes, pods, services, endpoints, namespaces, componentstatuses, configmaps, persistentvolumes, persistentvolumeclaims, serviceaccounts]
    verbs: [get, list, watch]
  - apiGroups: ["apps"]
    resources: [deployments, statefulsets, daemonsets, replicasets]
    verbs: [get, list, watch]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: [roles, rolebindings, clusterroles, clusterrolebindings]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [pods/log]
    verbs: [get]
  # Deep check: kubeadm certs check-expiration / etcdctl 위해 exec / proxy 필요
  - apiGroups: [""]
    resources: [pods/exec, pods/proxy, nodes/proxy]
    verbs: [create, get]
  # K8sEvent notification channel
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch, list, get, watch]
  - nonResourceURLs: ["/healthz", "/livez", "/readyz", "/healthz/*", "/livez/*", "/readyz/*"]
    verbs: [get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Namespace }}-cluster-reader-binding
  labels:
    {{- include "k8s-daily-monitor.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Namespace }}-cluster-reader
subjects:
  - kind: ServiceAccount
    name: {{ .Values.serviceAccount.name }}
    namespace: {{ .Release.Namespace }}
{{- end }}
