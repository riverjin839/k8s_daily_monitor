{{- if .Values.deepcheck.enabled }}
# pod_to_pod 체커가 일회용 probe pod 를 띄울 때 사용하는 ns.
# 이미 존재하면 helm hook 으로 충돌하지 않도록 helm.sh/resource-policy=keep 적용.
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.deepcheck.probeNamespace | default "devops" }}
  labels:
    app.kubernetes.io/name: deepcheck-probe
    app.kubernetes.io/part-of: k8s-daily-monitor
  annotations:
    helm.sh/resource-policy: keep
{{- end }}
