apiVersion: v1
kind: Secret
metadata:
  name: k8s-monitor-secret
  labels:
    {{- include "k8s-daily-monitor.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_USER: {{ .Values.secrets.databaseUser | quote }}
  DATABASE_PASSWORD: {{ .Values.secrets.databasePassword | quote }}
  SECRET_KEY: {{ .Values.secrets.secretKey | quote }}
  DATABASE_URL: {{ include "k8s-daily-monitor.databaseUrl" . | quote }}
  REDIS_URL: "redis://redis:6379/0"
  CELERY_BROKER_URL: "redis://redis:6379/0"
  CELERY_RESULT_BACKEND: "redis://redis:6379/0"
  # Deep check / Super Pod
  SUPERPOD_INGEST_TOKEN: {{ .Values.deepcheck.ingestToken | quote }}
  # Notification channel defaults (override via NotificationChannel rows in DB)
  SLACK_WEBHOOK_URL: {{ .Values.deepcheck.notifications.slack.webhookUrl | quote }}
  SMTP_HOST: {{ .Values.deepcheck.notifications.smtp.host | quote }}
  SMTP_PORT: {{ .Values.deepcheck.notifications.smtp.port | quote }}
  SMTP_USER: {{ .Values.deepcheck.notifications.smtp.user | quote }}
  SMTP_PASSWORD: {{ .Values.deepcheck.notifications.smtp.password | quote }}
  SMTP_FROM: {{ .Values.deepcheck.notifications.smtp.from | quote }}
  SMTP_USE_TLS: {{ .Values.deepcheck.notifications.smtp.useTLS | quote }}
